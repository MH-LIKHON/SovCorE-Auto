# ============================================================
# nginx/logrotate.conf
# ============================================================
#
# Purpose:
#   Logrotate configuration for Nginx access and error logs
#   on the SovCorE Auto production VM. Copy to
#   /etc/logrotate.d/sovcore-nginx on the host.
#
# Usage:
#   sudo cp nginx/logrotate.conf /etc/logrotate.d/sovcore-nginx
#   sudo logrotate -d /etc/logrotate.d/sovcore-nginx  # dry-run test
#
# Retention: 30 daily files. Access logs generate roughly 10-50 MB
# per day under normal load. 30 files is approximately one month.
#
# ============================================================

/var/log/nginx/access.log
/var/log/nginx/error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    sharedscripts
    postrotate
        # Send USR1 to Nginx so it re-opens the log files without
        # restarting — zero-downtime rotation.
        if [ -f /run/nginx.pid ]; then
            kill -USR1 $(cat /run/nginx.pid)
        fi
    endscript
}
