# ============================================================
# nginx/nginx.conf
# ============================================================
#
# Purpose:
#   Nginx configuration for SovCorE Auto in production. Nginx
#   runs on the Ubuntu VM and routes inbound requests from
#   Cloudflare Tunnel to the two Docker containers.
#
# Design:
#   All traffic enters through Cloudflare Tunnel (cloudflared),
#   which binds to localhost:8080 and forwards to Nginx on that
#   same port. Nginx is therefore the second hop, not the first.
#   TLS is terminated at Cloudflare; Nginx sees plain HTTP from
#   the Tunnel and does not need its own TLS certificate.
#
#   Two upstreams:
#     - frontend (Next.js) at localhost:3000
#     - backend  (FastAPI) at localhost:8000
#
#   Routing rule:
#     /api/* and /api/docs /api/redoc forward to the backend.
#     Everything else forwards to the frontend.
#
#   Real IP restoration:
#     Cloudflare forwards the real client IP in CF-Connecting-IP.
#     Nginx passes it to the backend via X-Real-IP so the rate
#     limiter in the backend uses the correct address.
#
#   Static files for the Next.js frontend are served by the
#   container itself (the standalone server includes a static
#   handler) so no separate static block is needed here.
#
# ============================================================

# ==================================================
# WORKER SETTINGS
# ==================================================

worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

# ==================================================
# HTTP
# ==================================================

http {

    # ------------------------------ Mime types --------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ------------------------------ Logging -----------------------------------
    # JSON access log for structured ingestion by a log collector.
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"cf_ip":"$http_cf_connecting_ip",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"referrer":"$http_referer",'
            '"ua":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ------------------------------ Performance -------------------------------
    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript;

    # ------------------------------ Security ----------------------------------
    server_tokens off;     # Do not reveal Nginx version in error responses.

    # ------------------------------ Upstreams ---------------------------------
    upstream frontend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    upstream backend {
        server 127.0.0.1:8000;
        keepalive 16;
    }

    # ==================================================
    # SERVER
    # ==================================================

    server {
        # Cloudflare Tunnel forwards to port 80 on localhost.
        listen 80;
        server_name _;

        # ------------------------------ Client limits -------------------------
        client_max_body_size 50M;    # Allows document and photo uploads up to 50 MB.
        client_body_timeout  60s;
        client_header_timeout 10s;
        send_timeout          60s;

        # ------------------------------ Real IP from Cloudflare ---------------
        # Cloudflare Tunnel runs on localhost so $remote_addr is always 127.0.0.1.
        # The real client IP comes from the CF-Connecting-IP header.
        set_real_ip_from 127.0.0.1;
        real_ip_header   CF-Connecting-IP;

        # ------------------------------ Backend: /api ------------------------
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";

            # Readiness probe: backend must respond within 5 s.
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
        }

        # ------------------------------ Health / readiness (short timeout) ---
        location = /api/v1/health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;
        }

        location = /api/v1/readiness {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;
        }

        # ------------------------------ Frontend: everything else ------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            # WebSocket support for Next.js hot-module replacement is not
            # needed in production; the Upgrade header is forwarded anyway
            # in case Next.js uses a streaming connection.
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
        }
    }
}
