# ============================================================
# docker-compose.dev.yml
# ============================================================
#
# Purpose:
#   Local development environment for SovCorE Auto. Runs the
#   frontend (Next.js) and backend (FastAPI) with hot reload,
#   and a local PostgreSQL instance for development.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# ============================================================

version: "3.9"

services:

  # ----------------------------------------------------------
  # PostgreSQL (development only — production uses Neon)
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sovcore_auto
      POSTGRES_USER: sovcore
      POSTGRES_PASSWORD: sovcore_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovcore -d sovcore_auto"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FastAPI backend
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend/app
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sovcore:sovcore_dev@postgres/sovcore_auto
      APP_ENV: development
      APP_DEBUG: "true"
    env_file:
      - ./backend/app/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ----------------------------------------------------------
  # Next.js frontend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./frontend/web/.env.local
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_dev_data:
