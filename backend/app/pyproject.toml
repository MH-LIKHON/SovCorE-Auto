# ============================================================
# backend/app/pyproject.toml
# ============================================================
#
# Purpose:
#   Project metadata and tool configuration for the SovCorE
#   Auto backend. Ruff handles linting and formatting; mypy
#   handles type checking.
#
# ============================================================

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "T20"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]
