# ============================================================
# backend/app/alembic.ini
# ============================================================
#
# Purpose:
#   Alembic configuration file for SovCorE Auto database
#   migrations. The sqlalchemy.url is set to "env" so that
#   alembic/env.py reads the DATABASE_URL from the application
#   settings rather than hard-coding a value here.
#
# Usage:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1
#
# ============================================================

[alembic]
# Path to migration scripts.
script_location = alembic

# Template for revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps.
timezone = UTC

# Suppress noisy SQLAlchemy logging during migrations.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
